spring.application.name=chatbotwa

# Configuración del servidor
server.port=8080

# Importar configuración desde .env opcionalmente
spring.config.import=optional:file:.env[.properties]

# Credenciales de WhatsApp Cloud API
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.api-token=${WHATSAPP_API_TOKEN}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}

# Credenciales de Google Gemini
spring.ai.gemini.api-key=${GEMINI_API_KEY}
spring.ai.gemini.chat.options.model=gemini-2.0-flash
